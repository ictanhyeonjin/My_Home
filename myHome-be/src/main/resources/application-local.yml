spring:
  application:
    name: myhome-local
  datasource:
    url: jdbc:mariadb://localhost:3306/myhome
    username: root
    password: root1234!
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      connection-timeout: 3000
      validation-timeout: 3000
      minimum-idle: 5
      max-lifetime: 240000
      maximum-pool-size: 20
      auto-commit: false
